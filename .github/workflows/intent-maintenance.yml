name: Intent Layer Maintenance

on:
  push:
    branches:
      - main

jobs:
  update-intent-layer:
    name: Update stale AGENTS.md nodes
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need HEAD and HEAD~1 for the diff

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate diff
        run: |
          git diff HEAD~1 HEAD > /tmp/diff.txt
          echo "Diff size: $(wc -l < /tmp/diff.txt) lines"
          # Skip if diff is empty (e.g. merge commits with no file changes)
          if [ ! -s /tmp/diff.txt ]; then
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      - name: Run intent-maintenance subagent
        if: env.SKIP != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --agent intent-maintenance \
                 --input-file /tmp/diff.txt \
                 --output-file /tmp/maintenance-summary.txt \
                 --model claude-sonnet-4-6

      - name: Check for changed AGENTS.md files
        if: env.SKIP != 'true'
        id: check-changes
        run: |
          # Find any AGENTS.md files that were modified by the subagent
          CHANGED=$(git diff --name-only | grep 'AGENTS\.md' || true)
          if [ -z "$CHANGED" ]; then
            echo "No AGENTS.md files changed — nothing to PR"
            echo "HAS_CHANGES=false" >> "$GITHUB_ENV"
          else
            echo "Changed nodes:"
            echo "$CHANGED"
            echo "HAS_CHANGES=true" >> "$GITHUB_ENV"
            echo "$CHANGED" > /tmp/changed-nodes.txt
          fi

      - name: Create PR for node updates
        if: env.HAS_CHANGES == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create a branch for this update
          BRANCH="intent-layer/update-$(git rev-parse --short HEAD)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Stage only AGENTS.md files (never stage source code)
          git diff --name-only | grep 'AGENTS\.md' | xargs git add

          git commit -m "chore: update intent layer [auto]

Triggered by: ${{ github.sha }}
Commit message: ${{ github.event.head_commit.message }}

Updated nodes:
$(cat /tmp/changed-nodes.txt)"

          git push origin "$BRANCH"

          # Build PR body from maintenance summary
          SUMMARY=$(cat /tmp/maintenance-summary.txt 2>/dev/null || echo "See diff for details.")

          gh pr create \
            --title "chore: update intent layer [auto] for $(git rev-parse --short HEAD~1)" \
            --body "## Intent Layer Maintenance

This PR was automatically generated by the \`intent-maintenance\` subagent
in response to changes merged to \`main\`.

**Trigger commit:** ${{ github.sha }}
**Changed by:** ${{ github.event.head_commit.author.name }}

### Maintenance Summary

\`\`\`
${SUMMARY}
\`\`\`

### Review checklist
- [ ] The updated nodes accurately reflect the code changes
- [ ] No content was added outside the diff's blast radius
- [ ] No institutional knowledge was accidentally removed
- [ ] Line counts remain under 300 per node

If any update looks wrong, close this PR and manually update the affected
node — see \`MAINTENANCE.md\` for instructions." \
            --base main \
            --head "$BRANCH" \
            --label "intent-layer" || true
